name: ai-enforced-workflow
version: 8
description: Spec-driven workflow with unified verification-cycle checkpoints, optional repository-index cache support, resumable active verifier sessions, and valid-pass termination
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity.
      - **What Changes**: Bullet list of concrete capability, workflow, skill,
        or contract changes.
      - **Capabilities**: Identify which specs will be created or modified.
      - **Risk Tier**: Classify the change as `LIGHT`, `STANDARD`, or `STRICT`
        using concrete triggers.
      - **Impact**: Affected code, APIs, dependencies, systems, and skills.


      IMPORTANT:

      - The Capabilities section is the contract between proposal and specs.
      - The Risk Tier controls how strict later design and verification steps
        must be.
      - Do not use abstract labels like "improve architecture" without naming
        concrete capabilities or artifacts that will change.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal.
      - Modified capabilities: use the existing spec folder name from
        `openspec/specs/<capability>/`.


      Delta operations (use `##` headers):

      - **ADDED Requirements**
      - **MODIFIED Requirements**
      - **REMOVED Requirements**
      - **RENAMED Requirements**


      Format requirements:

      - Each requirement: `### Requirement: <name>`
      - Use SHALL/MUST for normative requirements
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - Every requirement MUST have at least one scenario


      For workflow and architecture-related capabilities, requirements MUST be
      testable as document or process checks, not only as code behavior.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create if any apply):

      - Cross-cutting change or new architectural pattern
      - New external dependency or significant data model change
      - Security, performance, migration, or workflow-gating complexity
      - Ambiguity that benefits from technical decisions before coding
      - Proposal risk tier is `STANDARD` or `STRICT`


      Required sections:

      - **Context**
      - **Goals / Non-Goals**
      - **Decisions**
      - **Risks / Trade-offs**
      - **Migration Plan**
      - **Open Questions**


      Each key Decision MUST include:

      - the problem being solved
      - alternatives considered
      - why this option was chosen
      - at least one verification hook


      ANTI-ABSTRACTION GUARDRAILS:

      For each important mechanism or boundary, provide:

      - **Stack Equivalent**
      - **Named Deliverables**
      - **Failure Semantics**
      - **Boundary Examples**
      - **Contrast Structure**
      - **Verification Hook**


      SKILL ORCHESTRATION:

      - If the change references, aligns with, or replicates an existing
        system, use `openspec-align` before finalizing design decisions.
      - Use `openspec-architect` for architectural comparisons and stack
        equivalents.
      - All verification stages MUST use the shared sequence
        `verify-sequence/default` from
        `openspec/schemas/ai-enforced-workflow/verification-sequence.md`.
      - Repository-index support uses `index-sequence/default` only as optional
        cache discovery or refresh, never as a Stage 0 gate.
      - `openspec-artifact-verify` and `openspec-verify-change` MUST stay thin
        and delegate orchestration to the shared sequence.
      - The docs-first artifact gate belongs to the caller that finishes the
        `applyRequires` artifact set (`openspec-propose`,
        `openspec-ff-change`, or `openspec-continue-change`), not to
        `openspec-apply-change`.
      - Those artifact-completion callers MUST start that docs-first gate
        automatically in the same turn unless the caller explicitly requested
        `dry-run` or `manual_pause`.
      - Invoking those artifact-completion callers is explicit authorization
        for the main process to create the verifier sub-agents required by
        that docs-first gate, limited to the reviewer sessions required by the
        workflow.
      - Human-only confirmation does not satisfy a verification gate.


      INDEPENDENT VERIFIER PLAN (required for `STANDARD` and `STRICT`):

      For each independent verification step, design.md MUST document:

      - sequence reference:
        `openspec/schemas/ai-enforced-workflow/verification-sequence.md#verify-sequence/default`
      - shared JSON verification contract:
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-core-v1.json`
      - OpenSpec subject adapter:
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-openspec-adapter-v1.json`
      - agent-table contract:
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-agent-table-v1.json`
      - cache-helper reference:
        `openspec/schemas/ai-enforced-workflow/index-sequence.md#index-sequence/default`
      - verifier agent path:
        `.codex/agents/verify-reviewer.toml`
      - index-maintainer agent path:
        `.codex/agents/index-maintainer.toml`
      - index skill entry points:
        `openspec-index-preflight` and `openspec-index-maintain`
      - verifier invocation method:
        built-in subagent API in the main process with `fork_context=false`
        and only the minimal verification bundle, optional `index_context`,
        and `output_paths`
      - verifier invocation template:
        `verify-reviewer-inline-v3`
      - shared field groups from `verification-cycle-core-v1.json` and
        `verification-cycle-openspec-adapter-v1.json`:
        `invocation_common_required / output_paths_required /
        verifier_evidence_required / subject_required_any_of /
        findings_required / finding_object_required / finding_semantics /
        repair_routing_rules / valid_pass_requirements / partial_scope_rule`
      - session semantics:
        checkpoints use the same active/non_active/closed cycle;
        usable active agents are continued first;
        callers prefer `send_input` while the same active agent is still open;
        `send_input` returning `agent not found` still routes to `resume`, not
        spawn;
        callers use `resume` only when that same active agent was closed and
        must be restored;
        new agents are spawned only when no usable active agent exists;
        `no_usable_active_agent` means only that `agent-table.json` literally
        contains no `active` agent;
        recovery spawns keep distinct reason codes such as
        `active_agent_missing` or `active_agent_not_resumable`;
        `spawn_active` decisions expose machine-readable `spawn_reason_code`;
        only `block -> pass` marks `non_active`;
        termination depends on a valid active pass
      - transition ownership:
        only the main orchestrator may authorize resume, spawn, repair, or
        termination; it must not substitute its own judgment for verifier
        output
      - Gemini policy:
        optional only when repository or checkpoint policy explicitly enables
        dual review; not a default Stage A gate
      - runner contract details when Gemini is used:
        `gemini-capture`, raw report path, normalized report path, recovery
        semantics, and command-resolution evidence


      REVIEW GATE:

      Before finalizing design.md, include enough structure for unified review
      checkpoints, inline scope/coverage, and valid-pass termination through
      `verify-sequence/default`. Missing guardrails that affect a `STRICT`
      change are blocking.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the checkbox format exactly.**

      - Group related tasks under numbered `##` headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Order tasks by dependency
      - Keep tasks anchored to concrete deliverables


      REQUIRED TASK PROPERTIES:

      - Tasks MUST name concrete outputs
      - Tasks MUST include verification work, not only implementation work
      - Tasks for workflow behavior MUST mention how the behavior will be
        exercised or audited
      - Verification tasks in `STANDARD` or `STRICT` changes MUST reference
        `verify-sequence/default`, reference shared field groups from
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-core-v1.json`
        and
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-openspec-adapter-v1.json`,
        name verifier output/report paths, define routing target and
        caller-local guardrails, require execution evidence using the shared
        `verifier_evidence_required` contract, require subject binding through
        `subject_required_any_of`, and carry findings routing semantics from
        `findings_required / finding_object_required / finding_semantics /
        repair_routing_rules`
      - Review tasks MUST require `agent-table.json`
      - Tasks MUST state that usable active agents are continued first, that
        callers prefer `send_input` while the same active agent is still open,
        that `send_input` returning `agent not found` still routes to
        `resume`, not spawn, that callers use `resume` only when that same
        active agent was closed
        and must be restored, that new agents are spawned only when no usable
        active agent exists, that `no_usable_active_agent` means only that
        `agent-table.json` literally contains no `active` agent, that
        recovery spawns keep distinct reason codes such as
        `active_agent_missing` or `active_agent_not_resumable`, that
        `spawn_active` decisions expose machine-readable `spawn_reason_code`,
        that only `block -> pass` marks `non_active`, and that termination
        depends on a valid active pass
        and must be restored, that new agents are spawned only when no usable
        active agent exists, that `no_usable_active_agent` means only that
        `agent-table.json` literally contains no `active` agent, that only
        `block -> pass` marks `non_active`, and that termination depends on a
        valid active pass
      - If the task list completes the schema's `applyRequires` set, tasks
        MUST make clear that the artifact-completion caller owns the
        docs-first review before implementation entry; `openspec-apply-change`
        does not
      - Tasks MUST NOT introduce a standalone planner file, planner schema, or
        planner agent as a prerequisite for review


      RISK-TIER GATING:

      - `LIGHT`: verifier-subagent review
      - `STANDARD`: explicit verification-cycle checkpoints
      - `STRICT`: same as `STANDARD`, plus explicit exercises and, only when
        repository policy opts in, Gemini dual-review checkpoints


      CHECKPOINTS:

      Any task group that modifies core workflow gates, verification logic, or
      repair routing MUST end with a checkpoint task in this exact format:

      - [ ] X.Y [Checkpoint] Run verifier-subagent review using
        `verify-sequence/default` for [specific output]. Use repository-index
        cache helper `index-sequence/default` only when cache discovery or
        refresh is useful; do not require cache authority before review.
        Reference the shared field groups in
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-core-v1.json`
        and
        `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-openspec-adapter-v1.json`
        for `invocation_common_required`, `output_paths_required`,
        `verifier_evidence_required`, `subject_required_any_of`,
        `findings_required`, `finding_object_required`,
        `finding_semantics`, `repair_routing_rules`,
        `valid_pass_requirements`, and `partial_scope_rule`, plus the routing
        target and any caller-local guardrails. Require authoritative verifier
        findings JSON, verifier execution evidence JSON, and
        `agent-table.json`. State that usable active agents are continued
        first, that callers prefer `send_input` while the same active agent is
        still open, that `send_input` returning `agent not found` still routes
        to `resume`, not spawn, that callers use `resume` only when that same
        active agent was closed and must be restored, that new agents are
        spawned only when no usable active agent exists, that
        `no_usable_active_agent` means only that `agent-table.json` literally
        contains no `active` agent, that recovery spawns keep distinct reason
        codes such as `active_agent_missing` or
        `active_agent_not_resumable`, that `spawn_active` decisions expose
        machine-readable `spawn_reason_code`, that only `block -> pass` marks
        an agent `non_active`, and that termination depends on a valid active pass. If the checkpoint
        explicitly enables Gemini dual review, require logical runner contract
        `gemini-capture`, raw plus normalized output, and recovery via
        `input_raw_path -> report_path`.


      SKILL AWARENESS:

      Reference the expected skills when tasks depend on them
      (`openspec-align`, `openspec-architect`, `openspec-artifact-verify`,
      `openspec-repair-change`, `openspec-verify-change`).
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, and mark complete as you go.

    For any verification or checkpoint task in `ai-enforced-workflow`:
    - execute shared sequence `verify-sequence/default`
    - use repository-index helper `index-sequence/default` only for optional
      cache discovery or refresh
    - do not require cache authority before review can start or
      complete
    - use verifier agent `.codex/agents/verify-reviewer.toml` in read-only mode
      with bundle fields from
      `openspec/schemas/modules/verification-cycle/contracts/verification-cycle-openspec-adapter-v1.json`
      -> `required_fields`
    - when cache helper runs, pass optional `index_context`
    - pass `output_paths`
      from `verification-cycle-core-v1.json` -> `output_paths_required`
    - invoking an `ai-enforced-workflow` step that requires
      `verify-sequence/default` explicitly authorizes the verifier sub-agent
      spawns required by that step, limited to the reviewer sessions required
      by the workflow
    - verifier reviewer spawns MUST use `fork_context=false` and pass only the
      minimal verification bundle, optional `index_context`, and
      `output_paths`
    - maintain `agent-table.json` as the authoritative agent-state record
    - use the built-in subagent API for verifier execution; do not replace it with shell/exec when the subagent API is available
    - require authoritative verifier findings JSON plus verifier execution
      evidence JSON plus `agent-table.json`
    - assume docs-first artifact verification already closed before apply
      started; do not re-run that artifact gate as an apply prerequisite
    - require review execution evidence to include `review_scope` and
      `review_coverage`
    - require usable active agents to be continued first
    - require callers to prefer `send_input` while the same active agent is
      still open
    - require `continuation_probe` when the current active agent already went
      through a `send_input` / `resume` recovery attempt
    - require `resume` only when that same active agent was closed and must be
      restored
    - allow new verifier spawn when no usable active agent exists, including
      the literal no-active case and distinct recovery cases
    - require `no_usable_active_agent` to mean only that `agent-table.json`
      literally contains no `active` agent
    - require recovery spawns to keep distinct reason codes such as
      `active_agent_missing` or `active_agent_not_resumable`
    - require `spawn_active` decisions to expose machine-readable
      `spawn_reason_code`
    - allow `non_active` only on `block -> pass`
    - require termination to come only from a valid active pass
    - allow automatic repair only when
      `review_goal=implementation_correctness && blocking=true &&
      auto_fixable=true`
    - require `severity=SUGGESTION` findings to keep `blocking=false`
    - require `review_phase=docs_first` findings to keep
      `auto_fixable=false`
    - route blocking non-auto-fixable findings to `openspec-repair-change`
    - use Gemini only when repository or checkpoint policy explicitly enables
      dual review
    - do not substitute user confirmation for verification
